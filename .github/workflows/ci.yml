name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - master

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc -b
      - name: Lint
        run: npx eslint src --max-warnings 200
      - name: z-index layering check
        run: node scripts/check-zindex.mjs
      - name: Unit tests
        run: npm run test -- --run
      - name: Contract drift check
        run: node scripts/check-contract-drift.mjs
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: E2E smoke
        run: npx playwright test
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
